  <text x="108" y="1708.8" fill="#ffffff" fill-opacity="0.74" font-size="32" font-family="'Hiragino Sans','Yu Gothic',sans-serif">村長 の縦長キャラクターポートレート。 役割は ミルフィ村の村長。 外見の手掛かり: 村の現実と情を背負ってサトーを送り出す。 扉を開けると、村長は困ったような、それでいてどこか申し訳なさそうな顔で出迎えた。 話し方の印象: 「村長」 関係</text>
